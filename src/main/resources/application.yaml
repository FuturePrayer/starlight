spring:
  application:
    name: starlight
  datasource:
    url: ${STARLIGHT_DATASOURCE_URL:jdbc:h2:file:./data/starlight;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    username: ${STARLIGHT_DATASOURCE_USERNAME:sa}
    password: ${STARLIGHT_DATASOURCE_PASSWORD:}
#    driver-class-name: ${STARLIGHT_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration/common,classpath:db/migration/{vendor}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${STARLIGHT_ASSETS_MAX_FILE_SIZE:10485760}
      max-request-size: ${STARLIGHT_ASSETS_MAX_REQUEST_SIZE:12582912}
  ai:
    mcp:
      server:
        protocol: STATELESS
        name: Starlight notebook stateless mcp server
        version: 1.0.0
        type: SYNC
        streamable-http:
          mcp-endpoint: /api/mcp

starlight:
  note-trash:
    retention-days: ${STARLIGHT_NOTE_TRASH_RETENTION_DAYS:30}
    cleanup-cron: ${STARLIGHT_NOTE_TRASH_CLEANUP_CRON:0 20 3 * * *}
  git:
    allowed-hosts: ${STARLIGHT_GIT_ALLOWED_HOSTS:github.com,*.github.com,gitee.com,*.gitee.com,gitlab.com,*.gitlab.com,bitbucket.org,*.bitbucket.org,codeberg.org,*.codeberg.org,sourceforge.net,*.sourceforge.net,git.sr.ht,*.sr.ht,atomgit.com,*.atomgit.com,gitcode.com,*.gitcode.com}
    timeout-seconds: ${STARLIGHT_GIT_TIMEOUT_SECONDS:20}
  assets:
    max-file-size: ${STARLIGHT_ASSETS_MAX_FILE_SIZE:10485760}
    allowed-types: ${STARLIGHT_ASSETS_ALLOWED_TYPES:image/png,image/jpeg,image/webp,image/gif,image/avif}
    local:
      root: ${STARLIGHT_ASSETS_LOCAL_ROOT:./data/assets}
    s3:
      bucket: ${STARLIGHT_ASSETS_S3_BUCKET:}
      region: ${STARLIGHT_ASSETS_S3_REGION:cn-east-2}
      endpoint: ${STARLIGHT_ASSETS_S3_ENDPOINT:}
      access-key: ${STARLIGHT_ASSETS_S3_ACCESS_KEY:}
      secret-key: ${STARLIGHT_ASSETS_S3_SECRET_KEY:}
      path-style-access: ${STARLIGHT_ASSETS_S3_PATH_STYLE_ACCESS:false}
      prefix: ${STARLIGHT_ASSETS_S3_PREFIX:assets}

sa-token: 
  token-name: starlight-token
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

server:
  port: 8080

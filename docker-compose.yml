services:
  starlight:
    build:
      context: .
      dockerfile: deploy/Dockerfile.compose
    image: starlight:local
    container_name: starlight
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    volumes:
      - ./data:/app/data

